name: macOS arm64 CI

on:
  push:
  repository_dispatch:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@main
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@main
        with:
          distribution: 'zulu'
          java-version: '21'
          java-package: jdk

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Restore Gradle cache
        id: gradle-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
            .gradle
          key: gradle-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}-${{ github.run_id }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}-
            gradle-${{ runner.os }}-${{ runner.arch }}-

      - name: Build macOS arm64 native artifacts
        run: |
          chmod +x gradlew
          ./gradlew \
            :shared:linkDebugSharedMacosArm64 \
            :ui:linkDebugFrameworkMacosArm64 \
            --no-configure-on-demand \
            --build-cache

      - name: Save Gradle cache
        if: success()
        uses: actions/cache/save@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/build-cache
            .gradle
          key: gradle-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}-${{ github.run_id }}

      - name: Upload macOS arm64 native artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: calendar-macos-arm64-native
          path: |
            shared/build/bin/macosArm64/debugShared/libshared.dylib
            shared/build/bin/macosArm64/debugShared/libshared_api.h
            shared/build/bin/macosArm64/debugShared/libshared.dylib.dSYM
            ui/build/bin/macosArm64/debugFramework/ui.framework
          if-no-files-found: error
          retention-days: 7

      - name: Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 3
          keep_minimum_runs: 2
